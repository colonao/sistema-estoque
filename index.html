<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌱 Controle de Estoque Agrícola</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>🌱 Controle de Estoque Agrícola</h1>
    <p>Fazenda Fazendinha</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="aba-estoque">📦 Estoque</button>
    <button class="tab-btn" data-tab="aba-entrada">⬇️ Entrada</button>
    <button class="tab-btn" data-tab="aba-saida">⬆️ Saída</button>
    <button class="tab-btn" data-tab="aba-historico">📜 Histórico</button>
  </nav>

  <main class="container">

    <!-- ABA ESTOQUE -->
    <section id="aba-estoque" class="tab-content active">
      <h2>Estoque Atual</h2>
      <input type="text" id="filtro-estoque" class="filtro" placeholder="🔍 Buscar produto, ingrediente ou classe...">
      
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Ingrediente Ativo</th>
              <th>Classe</th>
              <th>Quantidade</th>
            </tr>
          </thead>
          <tbody id="tabela-estoque">
            <tr><td colspan="4" style="text-align:center;padding:20px">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ABA ENTRADA -->
    <section id="aba-entrada" class="tab-content">
      <h2>Registrar Entrada</h2>
      
      <form id="form-entrada" class="formulario">
        
        <div class="campo autocomplete-wrapper">
          <label>Produto *</label>
          <input type="text" id="entrada-produto" autocomplete="off" required placeholder="Digite para buscar...">
          <div id="entrada-sugestoes" class="sugestoes-box"></div>
          <div id="entrada-info"></div>
        </div>

        <div class="linha">
          <div class="campo">
            <label>Quantidade *</label>
            <input type="number" id="entrada-quantidade" step="0.01" min="0.01" required>
          </div>
          <div class="campo">
            <label>Unidade *</label>
            <select id="entrada-unidade" required>
              <option value="">Selecione</option>
              <option value="L">Litros (L)</option>
           <!-- 
              <option value="mL">Mililitros (mL)</option>
              -->
              <option value="Kg">Quilogramas (Kg)</option>
           <!--
              <option value="g">Gramas (g)</option>
              <option value="un">Unidades (un)</option>
              <option value="cx">Caixas (cx)</option>
              <option value="sc">Sacos (sc)</option> 
              -->
            </select> 
          </div>
        </div>      
        <div class="campo">
          <label>Origem / Fornecedor *</label>
          <input type="text" id="entrada-origem" required placeholder="Ex: Agropecuária XYZ">
        </div>

        <div class="campo">
          <label>Responsável *</label>
          <input type="text" id="entrada-responsavel" required placeholder="Nome de quem recebeu">
        </div>

        <div class="campo">
          <label>Observação</label>
          <textarea id="entrada-observacao" rows="2" placeholder="Opcional"></textarea>
        </div>

        <button type="submit" class="btn-primary">✅ Registrar Entrada</button>
      </form>
    </section>

    <!-- ABA SAÍDA -->
    <section id="aba-saida" class="tab-content">
      <h2>Registrar Saída</h2>
      
      <form id="form-saida" class="formulario">

        <div class="campo autocomplete-wrapper">
          <label>Produto *</label>
          <input type="text" id="saida-produto" autocomplete="off" required placeholder="Digite para buscar...">
          <div id="saida-sugestoes" class="sugestoes-box"></div>
          <div id="saida-info"></div>
        </div>

        <div class="linha">
          <div class="campo">
            <label>Quantidade *</label>
            <input type="number" id="saida-quantidade" step="0.01" min="0.01" required>
          </div>
          <div class="campo">
            <label>Unidade *</label>
            <input type="text" id="saida-unidade" readonly placeholder="Auto">
          </div>
        </div>

        <div class="campo">
          <label>Destino / Uso *</label>
          <input type="text" id="saida-destino" required placeholder="Ex: Talhão 3, Lavoura Norte">
        </div>

        <div class="campo">
          <label>Responsável *</label>
          <input type="text" id="saida-responsavel" required placeholder="Nome de quem utilizou">
        </div>

        <div class="campo">
          <label>Observação</label>
          <textarea id="saida-observacao" rows="2" placeholder="Opcional"></textarea>
        </div>

        <button type="submit" class="btn-primary btn-saida">⬆️ Registrar Saída</button>
      </form>
    </section>

    <!-- ABA HISTÓRICO -->
    <section id="aba-historico" class="tab-content">
      <h2>Histórico de Movimentações</h2>
      <input type="text" id="filtro-historico" class="filtro" placeholder="🔍 Buscar por produto, tipo ou responsável...">
      
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Data</th>
              <th>Tipo</th>
              <th>Produto</th>
              <th>Qtd</th>
              <th>Origem</th>
              <th>Destino</th>
              <th>Responsável</th>
              <th>Obs</th>
            </tr>
          </thead>
          <tbody id="tabela-historico">
            <tr><td colspan="9" style="text-align:center;padding:20px">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
