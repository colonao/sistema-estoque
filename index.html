<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌱 Controle de Insumos Agrícolas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🌱 Controle de Insumos</h1>
  </header>

  <!-- ABAS -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="tab-estoque">📦 Estoque</button>
    <button class="tab-btn" data-tab="tab-entrada">⬇️ Entrada</button>
    <button class="tab-btn" data-tab="tab-saida">⬆️ Saída</button>
    <button class="tab-btn" data-tab="tab-historico">📋 Histórico</button>
  </nav>

  <main>
    <!-- ESTOQUE -->
    <section id="tab-estoque" class="tab-content active">
      <h2>📦 Estoque Atual</h2>
      <input type="text" id="filtro-estoque" placeholder="🔍 Buscar por produto, ingrediente ou classe...">
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Ingrediente Ativo</th>
              <th>Classe</th>
              <th>Quantidade</th>
            </tr>
          </thead>
          <tbody id="tabela-estoque"></tbody>
        </table>
      </div>
    </section>

    <!-- ENTRADA -->
    <section id="tab-entrada" class="tab-content">
      <h2>⬇️ Registrar Entrada</h2>
      <form id="form-entrada">
        <label>Produto *</label>
        <div class="autocomplete-wrapper">
          <input type="text" id="entrada-produto" placeholder="Digite para buscar..." autocomplete="off" required>
          <div id="entrada-sugestoes" class="sugestoes"></div>
        </div>
        <div id="entrada-info"></div>

        <div class="form-row">
          <div class="form-col">
            <label>Quantidade *</label>
            <input type="number" id="entrada-quantidade" step="0.01" min="0.01" required>
          </div>
          <div class="form-col">
            <label>Unidade *</label>
            <select id="entrada-unidade" required>
              <option value="">Selecione</option>
              <option value="kg">kg</option>
              <option value="L">L</option>
              <option value="un">un</option>
              <option value="sc">sc</option>
              <option value="g">g</option>
              <option value="mL">mL</option>
            </select>
          </div>
        </div>

        <label>Origem * <small>(fornecedor, revenda, etc)</small></label>
        <input type="text" id="entrada-origem" placeholder="Ex: Agropecuária Central" required>

        <label>Destino * <small>(local de armazenamento)</small></label>
        <input type="text" id="entrada-destino" placeholder="Ex: Depósito 1, Galpão Principal" required>

        <label>Responsável *</label>
        <input type="text" id="entrada-responsavel" placeholder="Nome de quem registrou" required>

        <label>Observação</label>
        <textarea id="entrada-observacao" rows="2" placeholder="Opcional"></textarea>

        <button type="submit" class="btn-primary">✅ Registrar Entrada</button>
      </form>
    </section>

    <!-- SAÍDA -->
    <section id="tab-saida" class="tab-content">
      <h2>⬆️ Registrar Saída</h2>
      <form id="form-saida">
        <label>Produto *</label>
        <div class="autocomplete-wrapper">
          <input type="text" id="saida-produto" placeholder="Digite para buscar no estoque..." autocomplete="off" required>
          <div id="saida-sugestoes" class="sugestoes"></div>
        </div>
        <div id="saida-info"></div>

        <div class="form-row">
          <div class="form-col">
            <label>Quantidade *</label>
            <input type="number" id="saida-quantidade" step="0.01" min="0.01" required>
          </div>
          <div class="form-col">
            <label>Unidade</label>
            <input type="text" id="saida-unidade" readonly>
          </div>
        </div>

        <label>Origem * <small>(de onde saiu)</small></label>
        <input type="text" id="saida-origem" placeholder="Ex: Depósito 1" required>

        <label>Destino * <small>(talhão, área, aplicação)</small></label>
        <input type="text" id="saida-destino" placeholder="Ex: Talhão 3, Lavoura Norte" required>

        <label>Responsável *</label>
        <input type="text" id="saida-responsavel" placeholder="Nome de quem registrou" required>

        <label>Observação</label>
        <textarea id="saida-observacao" rows="2" placeholder="Opcional"></textarea>

        <button type="submit" class="btn-primary">✅ Registrar Saída</button>
      </form>
    </section>

    <!-- HISTÓRICO -->
    <section id="tab-historico" class="tab-content">
      <h2>📋 Histórico de Movimentações</h2>
      <input type="text" id="filtro-historico" placeholder="🔍 Buscar por produto, tipo ou responsável...">
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Data</th>
              <th>Tipo</th>
              <th>Produto</th>
              <th>Quantidade</th>
              <th>Origem</th>
              <th>Destino</th>
              <th>Responsável</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody id="tabela-historico"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
